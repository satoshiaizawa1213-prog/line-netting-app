<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30">
  <circle cx="15" cy="15" r="13" fill="none" stroke="#fcfcfc" stroke-width="2" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 15 15" to="720 15 15" dur="1s" repeatCount="indefinite" />
    <animate attributeName="stroke-dasharray" values="0 80;70 80;0 80" dur="1s" repeatCount="indefinite" />
  </circle>
</svg>
