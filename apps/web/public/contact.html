<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ — すっきりワリカン</title>
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #06c755;
      --green-dark: #049a41;
      --bg: #f4f6f8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: var(--bg);
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #00c300 0%, #049a41 100%);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .header-logo span { opacity: 0.85; }
    .header-back {
      margin-left: auto;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-back:hover { color: #fff; }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 20px 60px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #444;
      margin-bottom: 6px;
    }
    label .required {
      color: #ef4444;
      margin-left: 4px;
      font-size: 11px;
    }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(6,199,85,0.12);
      background: #fff;
    }
    input.error,
    textarea.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }
    textarea {
      resize: vertical;
      min-height: 140px;
      line-height: 1.6;
    }

    .field-error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    /* ハニーポット: ボット対策の隠しフィールド */
    .hp-field { display: none !important; }

    /* ── SUBMIT BUTTON ── */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: var(--green);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 14px rgba(6,199,85,0.35);
    }
    .submit-btn:hover:not(:disabled) { background: var(--green-dark); }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── ERROR BANNER ── */
    .error-banner {
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      color: #b91c1c;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    /* ── SUCCESS STATE ── */
    .success-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 24px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
      display: none;
    }
    .success-icon {
      font-size: 52px;
      margin-bottom: 16px;
    }
    .success-title {
      font-size: 20px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 10px;
    }
    .success-body {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .back-btn {
      display: inline-block;
      padding: 12px 28px;
      background: var(--green);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(6,199,85,0.3);
      transition: background 0.2s;
    }
    .back-btn:hover { background: var(--green-dark); }

    /* ── FOOTER ── */
    footer {
      background: #1a1a1a;
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 24px;
      font-size: 12px;
    }
    footer a { color: rgba(255,255,255,0.4); text-decoration: none; }
    footer a:hover { color: rgba(255,255,255,0.7); }

    /* ── LOADING SPINNER ── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="header-logo">🤝 すっきり<span>ワリカン</span></div>
  <a href="/lp.html" class="header-back">← トップに戻る</a>
</header>

<main>
  <h1 class="page-title">お問い合わせ</h1>
  <p class="page-sub">ご質問・ご要望・不具合報告などをお気軽にお送りください。<br>通常2〜3営業日以内にご返信いたします。</p>

  <!-- フォーム -->
  <div class="form-card" id="form-card">
    <form id="contact-form" novalidate>

      <!-- ハニーポット（ボット対策・ユーザーには非表示） -->
      <div class="hp-field" aria-hidden="true">
        <input type="text" name="_honeypot" id="hp" tabindex="-1" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="name">お名前 <span class="required">必須</span></label>
        <input type="text" id="name" name="name" placeholder="山田 太郎" maxlength="100" autocomplete="name">
        <div class="field-error" id="name-error"></div>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス <span class="required">必須</span></label>
        <input type="email" id="email" name="email" placeholder="example@email.com" maxlength="200" autocomplete="email">
        <div class="field-error" id="email-error"></div>
      </div>

      <div class="form-group">
        <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
        <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください（10文字以上）" maxlength="2000"></textarea>
        <div class="field-error" id="message-error"></div>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        <span id="btn-text">📨 送信する</span>
        <span class="spinner" id="spinner"></span>
      </button>

      <div class="error-banner" id="error-banner"></div>
    </form>
  </div>

  <!-- 送信完了 -->
  <div class="success-card" id="success-card">
    <div class="success-icon">✅</div>
    <div class="success-title">送信しました！</div>
    <div class="success-body">
      お問い合わせいただきありがとうございます。<br>
      内容を確認の上、ご登録のメールアドレスへ<br>
      折り返しご連絡いたします。
    </div>
    <a href="/lp.html" class="back-btn">トップページへ戻る</a>
  </div>
</main>

<footer>
  <div>© 2026 すっきりワリカン</div>
</footer>

<script>
  const API_BASE = '/api'

  const form    = document.getElementById('contact-form')
  const nameEl  = document.getElementById('name')
  const emailEl = document.getElementById('email')
  const msgEl   = document.getElementById('message')
  const hpEl    = document.getElementById('hp')
  const submitBtn  = document.getElementById('submit-btn')
  const btnText    = document.getElementById('btn-text')
  const spinner    = document.getElementById('spinner')
  const errBanner  = document.getElementById('error-banner')
  const formCard   = document.getElementById('form-card')
  const successCard = document.getElementById('success-card')

  function showFieldError(id, msg) {
    const el = document.getElementById(id + '-error')
    const input = document.getElementById(id)
    if (el) { el.textContent = msg; el.style.display = msg ? 'block' : 'none' }
    if (input) { input.classList.toggle('error', !!msg) }
  }
  function clearErrors() {
    ['name', 'email', 'message'].forEach(id => showFieldError(id, ''))
    errBanner.style.display = 'none'
    errBanner.textContent = ''
  }

  function setLoading(on) {
    submitBtn.disabled = on
    btnText.textContent = on ? '送信中...' : '📨 送信する'
    spinner.style.display = on ? 'inline-block' : 'none'
  }

  function validate() {
    let ok = true
    const name = nameEl.value.trim()
    const email = emailEl.value.trim()
    const msg = msgEl.value.trim()

    if (!name) { showFieldError('name', 'お名前を入力してください。'); ok = false }
    else if (name.length > 100) { showFieldError('name', '100文字以内で入力してください。'); ok = false }

    if (!email) { showFieldError('email', 'メールアドレスを入力してください。'); ok = false }
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('email', '有効なメールアドレスを入力してください。'); ok = false }

    if (!msg) { showFieldError('message', 'お問い合わせ内容を入力してください。'); ok = false }
    else if (msg.length < 10) { showFieldError('message', '10文字以上入力してください。'); ok = false }
    else if (msg.length > 2000) { showFieldError('message', '2000文字以内で入力してください。'); ok = false }

    return ok
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    clearErrors()
    if (!validate()) return

    setLoading(true)
    try {
      const params = new URLSearchParams({
        name: nameEl.value.trim(),
        email: emailEl.value.trim(),
        message: msgEl.value.trim(),
        _honeypot: hpEl.value,
      })
      const res = await fetch(`${API_BASE}/contact`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params.toString(),
      })
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        errBanner.textContent = data.error ?? '送信に失敗しました。しばらくしてからお試しください。'
        errBanner.style.display = 'block'
        return
      }
      // 成功
      formCard.style.display = 'none'
      successCard.style.display = 'block'
    } catch {
      errBanner.textContent = 'ネットワークエラーが発生しました。接続を確認してお試しください。'
      errBanner.style.display = 'block'
    } finally {
      setLoading(false)
    }
  })

  // リアルタイムバリデーション（フォーカスアウト時）
  ;[nameEl, emailEl, msgEl].forEach(el => {
    el.addEventListener('blur', () => {
      clearErrors()
      validate()
    })
  })
</script>
</body>
</html>
