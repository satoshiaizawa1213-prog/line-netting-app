<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ — すっきりワリカン</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <style>
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 22px;
      box-shadow: var(--shadow);
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }
    label .required {
      color: var(--accent);
      margin-left: 6px;
      font-size: 11px;
      font-weight: 800;
    }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface-2);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
    }
    input::placeholder, textarea::placeholder { color: var(--text-3); }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
      background: var(--surface);
    }
    input.error, textarea.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
    }
    textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

    .field-error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
      font-weight: 700;
      display: none;
    }

    .hp-field { display: none !important; }

    .submit-btn {
      width: 100%;
      margin-top: 6px;
      padding: 16px;
      font-size: 16px;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .error-banner {
      background: color-mix(in srgb, #ef4444 12%, transparent);
      border: 1px solid color-mix(in srgb, #ef4444 36%, transparent);
      color: #fca5a5;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      margin-top: 16px;
      font-weight: 700;
      display: none;
    }

    .success-card {
      background: var(--surface);
      border: 1px solid var(--accent-line);
      border-radius: var(--radius);
      padding: 44px 24px;
      box-shadow: var(--glow-shadow);
      text-align: center;
      display: none;
    }
    .success-icon {
      width: 56px; height: 56px; margin: 0 auto 18px; border-radius: 16px;
      display: grid; place-items: center;
      background: var(--accent); color: var(--accent-ink);
      font-size: 28px; font-weight: 900;
      box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 50%, transparent);
    }
    .success-title { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 12px; }
    .success-body { font-size: 14px; color: var(--text-2); line-height: 1.75; margin-bottom: 24px; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid color-mix(in srgb, var(--accent-ink) 25%, transparent);
      border-top-color: var(--accent-ink);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="page-inner">

    <header class="site-header">
      <a class="brand" href="/lp.html"><span class="mark">ワ</span>すっきりワリカン</a>
      <a href="/lp.html" class="back-link">← トップ</a>
    </header>

    <section class="page-hero">
      <h1>お問い合わせ</h1>
      <p class="sub">ご質問・ご要望・不具合報告などお気軽に。<br>通常2〜3営業日以内にご返信いたします。</p>
    </section>

    <main class="content">
      <div class="form-card" id="form-card">
        <form id="contact-form" novalidate>
          <div class="hp-field" aria-hidden="true">
            <input type="text" name="_honeypot" id="hp" tabindex="-1" autocomplete="off">
          </div>

          <div class="form-group">
            <label for="name">お名前 <span class="required">必須</span></label>
            <input type="text" id="name" name="name" placeholder="山田 太郎" maxlength="100" autocomplete="name">
            <div class="field-error" id="name-error"></div>
          </div>

          <div class="form-group">
            <label for="email">メールアドレス <span class="required">必須</span></label>
            <input type="email" id="email" name="email" placeholder="example@email.com" maxlength="200" autocomplete="email">
            <div class="field-error" id="email-error"></div>
          </div>

          <div class="form-group">
            <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
            <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください（10文字以上）" maxlength="2000"></textarea>
            <div class="field-error" id="message-error"></div>
          </div>

          <button type="submit" class="btn btn-cta submit-btn" id="submit-btn">
            <span id="btn-text">送信する</span>
            <span class="spinner" id="spinner"></span>
          </button>

          <div class="error-banner" id="error-banner"></div>
        </form>
      </div>

      <div class="success-card" id="success-card">
        <div class="success-icon">✓</div>
        <div class="success-title">送信しました</div>
        <div class="success-body">
          お問い合わせいただきありがとうございます。<br>
          内容を確認の上、ご登録のメールアドレスへ<br>
          折り返しご連絡いたします。
        </div>
        <a href="/lp.html" class="btn btn-ghost">トップページへ戻る</a>
      </div>
    </main>

    <footer class="site-footer">
      <div class="brand"><span class="mark">ワ</span>すっきりワリカン</div>
      <div class="links">
        <a href="/manual.html">使い方ガイド</a>
        <a href="/demo.html">紹介動画デモ</a>
        <a href="/privacy.html">プライバシーポリシー</a>
        <a href="/contact.html">お問い合わせ</a>
      </div>
      <div class="copy">© 2026 すっきりワリカン</div>
    </footer>
  </div>
</div>

<script>
  const API_BASE = '/api'
  const form = document.getElementById('contact-form')
  const nameEl = document.getElementById('name')
  const emailEl = document.getElementById('email')
  const msgEl = document.getElementById('message')
  const hpEl = document.getElementById('hp')
  const submitBtn = document.getElementById('submit-btn')
  const btnText = document.getElementById('btn-text')
  const spinner = document.getElementById('spinner')
  const errBanner = document.getElementById('error-banner')
  const formCard = document.getElementById('form-card')
  const successCard = document.getElementById('success-card')

  function showFieldError(id, msg) {
    const el = document.getElementById(id + '-error')
    const input = document.getElementById(id)
    if (el) { el.textContent = msg; el.style.display = msg ? 'block' : 'none' }
    if (input) { input.classList.toggle('error', !!msg) }
  }
  function clearErrors() {
    ['name', 'email', 'message'].forEach(id => showFieldError(id, ''))
    errBanner.style.display = 'none'
    errBanner.textContent = ''
  }
  function setLoading(on) {
    submitBtn.disabled = on
    btnText.textContent = on ? '送信中...' : '送信する'
    spinner.style.display = on ? 'inline-block' : 'none'
  }
  function validate() {
    let ok = true
    const name = nameEl.value.trim()
    const email = emailEl.value.trim()
    const msg = msgEl.value.trim()
    if (!name) { showFieldError('name', 'お名前を入力してください。'); ok = false }
    else if (name.length > 100) { showFieldError('name', '100文字以内で入力してください。'); ok = false }
    if (!email) { showFieldError('email', 'メールアドレスを入力してください。'); ok = false }
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('email', '有効なメールアドレスを入力してください。'); ok = false }
    if (!msg) { showFieldError('message', 'お問い合わせ内容を入力してください。'); ok = false }
    else if (msg.length < 10) { showFieldError('message', '10文字以上入力してください。'); ok = false }
    else if (msg.length > 2000) { showFieldError('message', '2000文字以内で入力してください。'); ok = false }
    return ok
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    clearErrors()
    if (!validate()) return
    setLoading(true)
    try {
      const params = new URLSearchParams({
        name: nameEl.value.trim(),
        email: emailEl.value.trim(),
        message: msgEl.value.trim(),
        _honeypot: hpEl.value,
      })
      const res = await fetch(`${API_BASE}/contact?${params.toString()}`, { method: 'POST' })
      const data = await res.json().catch(() => ({}))
      if (!res.ok) {
        errBanner.textContent = data.error ?? '送信に失敗しました。しばらくしてからお試しください。'
        errBanner.style.display = 'block'
        return
      }
      formCard.style.display = 'none'
      successCard.style.display = 'block'
    } catch {
      errBanner.textContent = 'ネットワークエラーが発生しました。接続を確認してお試しください。'
      errBanner.style.display = 'block'
    } finally {
      setLoading(false)
    }
  })

  ;[nameEl, emailEl, msgEl].forEach(el => {
    el.addEventListener('blur', () => { clearErrors(); validate() })
  })
</script>
</body>
</html>
